[env:stm32f446]
platform = ststm32
board = genericSTM32F446RE
framework = stm32cube
upload_protocol = dfu
; upload_protocol = stlink
monitor_speed = 115200

; board_build.stm32cube.custom_config_header = yes
; board_build.stm32cube.startup_file = cube/Core/Startup/startup_stm32f446retx.s

; [platformio]
; src_dir = cube/Core/Src
; include_dir = cube/Core/Inc

build_src_filter =
  +<*> 
  +<../cube/**/*.c>
  -<../cube/Drivers/**/*.c>
  -<../cube/Middlewares/**/*.c>
  ; -<**/*.s> 
  ; +<cube/Middlewares/ST/STM32_USB_Device_Library/Core/Src/*.c>
  ; +<cube/Middlewares/ST/STM32_USB_Device_Library/Class/CDC/Src/*.c>
  ; +<**/*.c>
  ; +<**/*.s>
  ; +<**/*.ld>
  +<../cube/Core/Src/*>
  ; +<../cube/*>
;   -<../cube/Drivers/STM32F4xx_HAL_Driver/*>

build_flags =
  ; -D HAL_PCD_MODULE_ENABLED
  ; -D USE_HAL_DRIVER

  -I cube/Core/Inc
  ; -I cube/Drivers/STM32F4xx_HAL_Driver/Inc
  -I cube/Drivers/CMSIS/Device/ST/STM32F4xx/Include
  -I cube/Drivers/CMSIS/Include
  -I cube/Middlewares/ST/STM32_USB_Device_Library/Core/Inc
  -I cube/Middlewares/ST/STM32_USB_Device_Library/Class/CDC/Inc
  -I cube/USB_DEVICE/App
  -I cube/USB_DEVICE/Target
  
